<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alchemist 🧪 Web Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .metric-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .metric { text-align: center; padding: 10px; border-radius: 5px; background: #2a2a2a; }
        .metric h3 { font-size: 14px; margin: 0; color: #aaa; }
        .metric p { font-size: 24px; font-weight: bold; margin: 5px 0; color: #4caf50; }
        .history { max-height: 400px; overflow-y: auto; }
        .history-item { padding: 10px; border-bottom: 1px solid #333; font-size: 13px; display: flex; align-items: center; }
        .history-item.accepted { border-left: 4px solid #4caf50; background: rgba(76, 175, 80, 0.1); }
        .history-item.rejected { border-left: 4px solid #f44336; background: rgba(244, 67, 54, 0.1); }
        .status-badge { display: inline-block; padding: 5px 10px; border-radius: 20px; font-size: 12px; background: #444; }
    </style>
</head>
<body>
    <div class="header">
        <h1>⚛️ Alchemist AutoResearch Live</h1>
        <div id="status" class="status-badge">📡 Connection: Initializing...</div>
    </div>

    <div class="container">
        <!-- 메인 그래프 및 수치 -->
        <div class="card">
            <div class="metric-grid">
                <div class="metric"><h3>Initial FPS</h3><p id="initialFPS">0.0</p></div>
                <div class="metric"><h3>Best FPS</h3><p id="bestFPS">0.0</p></div>
                <div class="metric"><h3>Improvement</h3><p id="improvement">+0.0%</p></div>
            </div>
            <canvas id="fpsChart"></canvas>
        </div>

        <!-- 실시간 가설 및 로그 -->
        <div class="card">
            <h3>📜 Hypotheses & Log</h3>
            <div id="history" class="history"></div>
        </div>
    </div>

    <script>
        let fpsChart;
        async function updateDashboard() {
            try {
                const response = await fetch('/api/data');
                const data = await response.json();

                document.getElementById('initialFPS').innerText = data.initialFPS.toFixed(1);
                document.getElementById('bestFPS').innerText = data.bestFPS.toFixed(1);
                document.getElementById('improvement').innerText = `+${data.improvement.toFixed(1)}%`;
                document.getElementById('status').innerText = `📡 Last Update: ${data.lastUpdate || "Wait..."}`;

                // 로그 업데이트
                const historyDiv = document.getElementById('history');
                historyDiv.innerHTML = data.history.map(item => `
                    <div class="history-item ${item.isAccepted ? 'accepted' : 'rejected'}">
                        <strong style="width: 50px">Gen ${item.generation}</strong>
                        <span style="width: 80px; font-weight: bold; color: ${item.isAccepted ? '#4caf50' : '#f44336'}">${item.fps.toFixed(1)} FPS</span>
                        <span>${item.strategy}</span>
                    </div>
                `).reverse().join('');

                // 차트 업데이트
                updateChart(data.history);
            } catch (e) {
                console.error("Dashboard Update Failed", e);
            }
        }

        function updateChart(history) {
            const ctx = document.getElementById('fpsChart').getContext('2d');
            const labels = history.map(h => `Gen ${h.generation}`);
            const data = history.map(h => h.fps);
            const colors = history.map(h => h.isAccepted ? '#4caf50' : '#f44336');

            if (fpsChart) fpsChart.destroy();
            fpsChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Performance (FPS)',
                        data: data,
                        borderColor: '#4caf50',
                        segment: {
                            borderColor: ctx => colors[ctx.p1DataIndex] || '#4caf50'
                        },
                        tension: 0.1,
                        fill: false
                    }]
                },
                options: { scales: { y: { beginAtZero: false, grid: { color: '#333' } } }, plugins: { legend: { display: false } } }
            });
        }

        setInterval(updateDashboard, 1000);
    </script>
</body>
</html>
